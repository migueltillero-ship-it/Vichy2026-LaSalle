<!DOCTYPE html>
<html lang="es-MX" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Vichy 2026 · Inmersión 3D | La Salle & Alliance Française</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold:#C9A84C; --blue:#002395; --ink:#07070A; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        @media (max-width: 1024px) { *, *::before, *::after { cursor: auto; } }
        body { font-family: 'Outfit', sans-serif; background: var(--ink); color: #fff; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        #webgl-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; opacity: 0.6; mix-blend-mode: screen; }
        #custom-cursor { position: fixed; top: 0; left: 0; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 99999; transform: translate(-50%, -50%); mix-blend-mode: difference; display: none; }
        @media (min-width: 1025px) { #custom-cursor { display: block; } }
        .lux { font-family: 'Cormorant Garamond', serif; }
        #intro { position: fixed; inset: 0; background: var(--ink); z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; }
        .wa-btn { position: fixed; bottom: 30px; right: 30px; z-index: 100; background: #25D366; color: #fff; padding: 1.1rem; border-radius: 50%; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transition: 0.3s; }
        .ff { background: #fff !important; color: #1a1a1a !important; border-radius: 12px; padding: 1rem; width: 100%; border: 2px solid #e2e8f0; }
    </style>
</head>
<body>
<canvas id="webgl-canvas"></canvas>
<div id="custom-cursor"></div>
<a href="https://wa.me/5219671721870" target="_blank" class="wa-btn" aria-label="WhatsApp"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-5.824 4.74-10.563 10.573-10.564 5.824.001 10.566 4.746 10.566 10.564-.001 5.827-4.739 10.564-10.564 10.564z"/></svg></a>

<div id="intro">
    <div id="intro-inner" style="opacity:0">
        <img src="logos_banner.png" alt="Logos" class="max-w-md w-full mb-8">
        <h1 class="lux text-7xl">Vichy <em>2026</em></h1>
        <button id="start-btn" class="mt-8 px-12 py-4 border border-gold text-gold rounded-full hover:bg-gold hover:text-ink transition-all text-xl lux">Explorar Misión</button>
    </div>
</div>

<main id="main" class="opacity-0">
    <section class="h-screen flex items-center justify-center text-center px-6">
        <div class="relative z-10">
            <h2 class="lux text-6xl md:text-8xl mb-6 leading-tight">Habla francés.<br><em class="text-gold">Conquista el mundo.</em></h2>
            <p class="text-xl text-white/70 max-w-2xl mx-auto">Programa exclusivo de inmersión institucional para el Colegio La Salle.</p>
        </div>
    </section>

    <section class="py-24 bg-ink-mid">
        <div class="max-w-7xl mx-auto px-6 grid grid-cols-2 md:grid-cols-4 gap-12 text-center">
            <div><div class="stat-n text-gold text-7xl font-bold" data-target="18">0</div><p class="uppercase text-xs tracking-widest text-white/40">Días en Francia</p></div>
            <div><div class="stat-n text-gold text-7xl font-bold" data-target="60">0</div><p class="uppercase text-xs tracking-widest text-white/40">Horas de Academia</p></div>
            <div><div class="stat-n text-gold text-7xl font-bold" data-target="5">0</div><p class="uppercase text-xs tracking-widest text-white/40">Ciudades</p></div>
            <div><div class="stat-n text-gold text-7xl font-bold">100%</div><p class="uppercase text-xs tracking-widest text-white/40">Inmersión</p></div>
        </div>
    </section>

    <section id="registro" class="sp bg-cream text-ink">
        <div class="max-w-4xl mx-auto px-6 bg-white p-12 rounded-[40px] shadow-2xl">
            <h3 class="lux text-4xl text-blue mb-8 text-center">Inscripción Oficial</h3>
            <form action="https://api.web3forms.com/submit" method="POST" class="space-y-6">
                <input type="hidden" name="access_key" value="205de288-1f78-4a3c-97d4-ae2950da7e82">
                <input type="text" name="nombre" placeholder="Nombre del Alumno" required class="ff">
                <input type="tel" name="whatsapp" placeholder="WhatsApp del Tutor" required class="ff">
                <button type="submit" class="w-full bg-blue text-white py-5 rounded-xl font-bold text-xl hover:bg-gold transition-all">Enviar Expediente</button>
            </form>
        </div>
    </section>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const init3D = () => {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const geo = new THREE.BufferGeometry();
            const count = 3000;
            const pos = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 12;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const points = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.02, color: 0xC9A84C, transparent: true, opacity: 0.7 }));
            scene.add(points); camera.position.z = 3;
            const animate = () => { requestAnimationFrame(animate); points.rotation.y += 0.001; renderer.render(scene, camera); };
            animate();
        };
        init3D();

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });

        gsap.to("#intro-inner", { opacity: 1, y: 0, duration: 1.5 });
        document.getElementById('start-btn').addEventListener('click', () => {
            gsap.to("#intro", { opacity: 0, duration: 1, onComplete: () => document.getElementById('intro').style.display = 'none' });
            gsap.to("#main", { opacity: 1, duration: 1 });
            document.querySelectorAll('.stat-n').forEach(el => {
                const target = parseInt(el.dataset.target);
                if(target) gsap.to({val:0}, { val: target, duration: 2.5, onUpdate: function() { el.textContent = Math.round(this.targets()[0].val); }});
            });
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vichy 2026 · Programa Oficial</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Outfit', sans-serif;
    background:#0b0b0f;
    color:#fff;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:#0b0b0f;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    z-index:10;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:linear-gradient(#0008,#000c), url('fallback.jpg') center/cover;
}

/* SECTIONS */
section{
    padding:80px 20px;
    max-width:900px;
    margin:auto;
}

/* FORM */
form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input,select,textarea{
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    padding:14px;
    border:none;
    background:#c9a84c;
    font-weight:bold;
    cursor:pointer;
}

#success{
    display:none;
    padding:20px;
    background:#d1fae5;
    color:#065f46;
    border-radius:10px;
}
</style>
</head>

<body>

<nav>
<div>Vichy 2026</div>
<div><a href="#registro" style="color:#c9a84c;">Registro</a></div>
</nav>

<div class="hero">
<div>
<h1>Vichy 2026</h1>
<p>Inmersión lingüística en Francia</p>
<a href="#registro"><button>Registrarme</button></a>
</div>
</div>

<section>
<h2>Programa</h2>
<p>18 días en Francia con formación académica, cultura y experiencia internacional.</p>
</section>

<section id="registro">
<h2>Registro</h2>

<div id="success">✅ Registro enviado correctamente. Te contactaremos pronto.</div>

<form id="form">
<input type="hidden" name="access_key" value="205de288-1f78-4a3c-97d4-ae2950da7e82">

<input type="text" name="nombre" placeholder="Nombre del estudiante" required>
<input type="text" name="tutor" placeholder="Nombre del tutor" required>
<input type="tel" name="telefono" placeholder="WhatsApp" required>

<select name="nivel" required>
<option value="">Nivel de francés</option>
<option>A1</option>
<option>A2</option>
<option>B1/B2</option>
</select>

<textarea name="mensaje" placeholder="Motivación"></textarea>

<button type="submit">Enviar</button>
</form>
</section>

<script>
const form = document.getElementById("form");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    const data = new FormData(form);

    const response = await fetch("https://api.web3forms.com/submit", {
        method: "POST",
        body: data
    });

    const result = await response.json();

    if(result.success){
        document.getElementById("success").style.display = "block";
        form.reset();
    } else {
        alert("Error al enviar. Intenta nuevamente.");
    }
});
</script>

</body>
</html>

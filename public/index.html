<!DOCTYPE html>
<html lang="es-MX" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Vichy 2026 · Experiencia Inmersiva 3D | Alliance Française</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Outfit:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold:#C9A84C; --blue:#002395; --ink:#07070A; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        @media (max-width: 1024px) { *, *::before, *::after { cursor: auto; } }
        body { font-family: 'Outfit', sans-serif; background: var(--ink); color: #fff; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        /* Lienzo WebGL 3D */
        #webgl-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; opacity: 0.6; mix-blend-mode: screen; }
        
        /* Cursor Sensorial */
        #custom-cursor { position: fixed; top: 0; left: 0; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 99999; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s; mix-blend-mode: difference; display: none; }
        @media (min-width: 1025px) { #custom-cursor { display: block; } }
        .cursor-hover { width: 50px !important; height: 50px !important; background: rgba(201,168,76,0.2) !important; border: 1px solid var(--gold); backdrop-filter: blur(4px); }

        .lux { font-family: 'Cormorant Garamond', serif; line-height: 1.05; }
        .tricolor { height: 3px; background: linear-gradient(90deg, var(--blue) 33%, #fff 33% 66%, #ED2939 66%); border-radius: 2px; }
        
        #intro { position: fixed; inset: 0; background: var(--ink); z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; }
        .sp { padding: 10rem 0; }
        .ff { background: #fff !important; color: #1a1a1a !important; border-radius: 12px; padding: 1rem; width: 100%; border: 2px solid #e2e8f0; }
        .wa-btn { position: fixed; bottom: 30px; right: 30px; z-index: 100; background: #25D366; color: #fff; padding: 1rem; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 0.3s; }
        .wa-btn:hover { transform: scale(1.1) rotate(10deg); }
    </style>
</head>
<body>

<canvas id="webgl-canvas"></canvas>
<div id="custom-cursor"></div>

<a href="https://wa.me/5219671721870" target="_blank" class="wa-btn hover-trigger" aria-label="WhatsApp">
    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-5.824 4.74-10.563 10.573-10.564 5.824.001 10.566 4.746 10.566 10.564-.001 5.827-4.739 10.564-10.564 10.564z"/></svg>
</a>

<audio id="bg-music" src="Arrival_at_the_Terminal (1).mp3" loop></audio>

<div id="intro">
    <div id="intro-inner" style="opacity:0">
        <img src="logos_banner.png" alt="Logos" class="max-w-md w-full mb-8">
        <div class="tricolor w-32 mx-auto mb-6"></div>
        <h1 class="lux text-7xl">Vichy <em>2026</em></h1>
        <p class="lux text-gold text-2xl mt-4 italic">Un Voyage d'Exception</p>
        <button id="start-btn" class="hover-trigger mt-8 px-12 py-4 border border-gold text-gold rounded-full hover:bg-gold hover:text-ink transition-all text-xl lux">Vivir la Experiencia</button>
    </div>
</div>

<main id="main" class="opacity-0">
    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <video id="hero-vid" class="absolute inset-0 w-full h-full object-cover opacity-40" playsinline muted loop>
            <source src="Vichy_2026_La_Salle.mp4" type="video/mp4">
        </video>
        <div class="relative z-10 text-center px-6">
            <h2 class="lux text-6xl md:text-8xl mb-6">Habla francés.<br><em class="text-gold">Conquista el mundo.</em></h2>
            <p class="text-xl text-white/70 max-w-2xl mx-auto">Programa exclusivo de inmersión para el Colegio La Salle.</p>
        </div>
    </section>

    <section class="py-20 bg-ink-mid">
        <div class="max-w-7xl mx-auto px-6 grid grid-cols-2 md:grid-cols-4 gap-12 text-center">
            <div><div class="stat-n text-gold text-6xl font-bold" data-target="18">0</div><p class="uppercase text-xs tracking-widest text-white/50">Días en Francia</p></div>
            <div><div class="stat-n text-gold text-6xl font-bold" data-target="60">0</div><p class="uppercase text-xs tracking-widest text-white/50">Horas de Academia</p></div>
            <div><div class="stat-n text-gold text-6xl font-bold" data-target="5">0</div><p class="uppercase text-xs tracking-widest text-white/50">Ciudades Visitadas</p></div>
            <div><div class="stat-n text-gold text-6xl font-bold">100%</div><p class="uppercase text-xs tracking-widest text-white/50">Inmersión Cultural</p></div>
        </div>
    </section>

    <section id="registro" class="sp bg-cream text-ink">
        <div class="max-w-4xl mx-auto px-6 bg-white p-12 rounded-[40px] shadow-2xl">
            <h3 class="lux text-4xl text-blue mb-8 text-center">Inscripción Oficial</h3>
            <form id="formulario" action="https://api.web3forms.com/submit" method="POST" class="space-y-6">
                <input type="hidden" name="access_key" value="205de288-1f78-4a3c-97d4-ae2950da7e82">
                <input type="text" name="nombre" placeholder="Nombre del Alumno" required class="ff">
                <input type="tel" name="whatsapp" placeholder="WhatsApp del Tutor" required class="ff">
                <button type="submit" class="w-full bg-blue text-white py-5 rounded-xl font-bold text-xl hover:bg-gold transition-colors">Enviar Expediente</button>
            </form>
        </div>
    </section>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- MOTOR 3D ---
        const init3D = () => {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const geo = new THREE.BufferGeometry();
            const count = 2000;
            const pos = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 12;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const points = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.02, color: 0xC9A84C, transparent: true, opacity: 0.6 }));
            scene.add(points); camera.position.z = 3;
            const animate = () => { requestAnimationFrame(animate); points.rotation.y += 0.001; renderer.render(scene, camera); };
            animate();
        };
        init3D();

        // --- SENSORIAL ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const chime = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        };
        document.querySelectorAll('.hover-trigger').forEach(el => el.addEventListener('mouseenter', chime));

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });

        gsap.to("#intro-inner", { opacity: 1, y: 0, duration: 1.5 });
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('bg-music').play().catch(() => {});
            gsap.to("#intro", { opacity: 0, duration: 1, onComplete: () => document.getElementById('intro').style.display = 'none' });
            gsap.to("#main", { opacity: 1, duration: 1 });
            document.getElementById('hero-vid').play();
            document.querySelectorAll('.stat-n').forEach(el => {
                const target = parseInt(el.dataset.target);
                if(target) gsap.to({val:0}, { val: target, duration: 2.5, onUpdate: function() { el.textContent = Math.round(this.targets()[0].val); }});
            });
        });
    });
</script>
</body>
</html>

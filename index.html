<html lang="es">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'af-blue': '#002395',
                        'af-red': '#ED2939',
                        'af-gold': '#C9A84C',
                        'cream': '#FDFBF7',
                        'slate-dark': '#07070A',
                        'slate-mid': '#111116',
                    },
                    fontFamily: {
                        'display': ['"Playfair Display"', 'serif'],
                        'body': ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root { --gold: #C9A84C; --blue: #002395; --red: #ED2939; --bg: #07070A; }
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #ffffff; overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        .luxury-title { font-family: 'Playfair Display', serif; line-height: 1.05; letter-spacing: -0.02em; }
        .gold-rule { width: 60px; height: 2px; background: linear-gradient(90deg, var(--gold), transparent); }
        .tricolor { height: 4px; background: linear-gradient(90deg, var(--blue) 33%, #fff 33% 66%, var(--red) 66%); border-radius: 2px; }
        
        .sr { opacity: 0; transform: translateY(40px); }
        .hero-elem { opacity: 0; transform: translateY(20px); }

        #site-nav { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        #site-nav.scrolled { background: rgba(7, 7, 10, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(201,168,76,0.15); padding-top: 1rem; padding-bottom: 1rem; }

        .logo-container { background: #ffffff; border-radius: 24px; padding: 1.5rem 3rem; display: inline-flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 3rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo-fix { object-fit: contain; mix-blend-mode: multiply; filter: contrast(1.15) brightness(1.05); }

        .video-box { position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: 24px; overflow: hidden; background: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); }
        .video-box video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

        .form-field { background: #ffffff !important; color: #1a1a1a !important; border: 1.5px solid #e2e8f0 !important; border-radius: 12px; padding: 1.2rem; font-size: 0.95rem; width: 100%; transition: all 0.3s; font-family: 'DM Sans', sans-serif; }
        .form-field:focus { outline: none; border-color: var(--gold) !important; box-shadow: 0 0 0 4px rgba(201,168,76,0.15); }

        #audio-control { position: fixed; bottom: 30px; left: 30px; z-index: 90; width: 55px; height: 55px; border-radius: 50%; background: rgba(7,7,10,0.85); border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; pointer-events: none; color: var(--gold); }
        #audio-control.visible { opacity: 1; pointer-events: auto; }
        #audio-control:hover { background: var(--gold); color: #000; transform: scale(1.15); }

        .qr-box { width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; background: white; border-radius: 16px; border: 1px solid #e5e7eb; box-shadow: 0 10px 25px rgba(0,0,0,0.08); overflow: hidden; margin: 0 auto; }
        .qr-box img { width: 120px; height: 120px; object-fit: contain; }

        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); }

        html { scroll-behavior: smooth; }
    </style>
</head>
